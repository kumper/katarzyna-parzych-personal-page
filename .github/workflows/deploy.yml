name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare upload
        run: |
          mkdir -p site
          cp -r assets site/
          cp -r css site/
          cp -r js site/
          cp index.html site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'site''

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
